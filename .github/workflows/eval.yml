name: Evaluation Suite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out repo
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-api.txt
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx pandas tabulate huggingface_hub

    - name: Download Model Weights
      run: |
        huggingface-cli download --repo-type space Liva21/financial-sentiment-api --include "models/finbert-finetuned/*" --local-dir .

    - name: Start API Server
      run: |
        uvicorn src.api:app --host 127.0.0.1 --port 8000 &
        echo "Waiting for API to start..."
        sleep 10
        curl -s http://127.0.0.1:8000/health

    - name: Run Pytest Evaluation
      run: |
        pytest tests/test_regression.py -v

    - name: Upload Evaluation Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: eval-report
        path: docs/eval_report.md
